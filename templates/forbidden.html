{% extends "base.html" %}
{% block title %}Access restricted · Trivia{% endblock %}
{% block content %}
<div class="container">
  <header class="app-header">
    <h1>Access restricted</h1>
  </header>
  <div class="screen" style="text-align:center;">
    <p>Your account ({{ session.user.email }}) doesn't have permission to administer this game.</p>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Back to game</a>
    <a href="{{ url_for('logout') }}" class="btn btn-secondary">Log out</a>
  </div>
</div>
{% endblock %}
